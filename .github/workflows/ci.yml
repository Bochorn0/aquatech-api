# PR checks: secrets, SAST (Semgrep), tests, dependency audit (FEMSA 40 / 50 / 7).
# Pushes to main still use the Azure deploy workflow only (no duplicate runs).

name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: semgrep/semgrep-action@v1
        env:
          # Debug console.* with dynamic values: low risk; tracked in CVE backlog if needed.
          SEMGREP_APPEND_OPTIONS: >-
            --exclude-rule
            javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring
        with:
          config: >-
            p/nodejs
            p/javascript
            p/expressjs

  test:
    name: Unit tests & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: npm audit (critical or higher)
        run: npm audit --audit-level=critical
