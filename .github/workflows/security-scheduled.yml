# Periodic security evidence (FEMSA controls 40 / 50): SAST + dependency audit.
# Runs weekly and on demand; does not deploy.

name: Security scan (scheduled)

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: semgrep/semgrep-action@v1
        env:
          SEMGREP_APPEND_OPTIONS: >-
            --exclude-rule
            javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring
        with:
          config: >-
            p/nodejs
            p/javascript
            p/expressjs

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical or higher)
        run: npm audit --audit-level=critical
